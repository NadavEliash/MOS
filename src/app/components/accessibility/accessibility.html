@if (open()) {<div class="backdrop" (click)="toggleOpen()" tabindex="-1" aria-hidden="true"></div>}
<div class="accessibility">
  <button class="accessibility-button" (click)="toggleOpen()" aria-haspopup="true" [attr.aria-expanded]="open()"
    aria-label="תפריט נגישות">
    <img src="/assets/accessibility.svg" alt="נגישות">
  </button>

  @if (open()) {
  <div class="accessibility-menu" aria-label="תפריט נגישות">
    <div class="menu-item">
      <span class="label">ניגודיות צבעים</span>
      <button type="button" class="toggle contrast-border" (click)="toggleContrast()" role="switch" [attr.aria-checked]="contrast()"
        [attr.aria-label]="contrast() ? 'בטל ניגודיות' : 'הפעל ניגודיות'">
        <span class="knob" [class.on]="contrast()"></span>
      </button>
    </div>

    <div class="menu-item">
      <span class="label">גודל טקסט</span>
      <div class="slider-wrap">
        <input type="range" min="100" max="200" [value]="(fontScale() * 100)" (input)="setFontScale($any($event.target).value)" aria-label="הגדר גודל טקסט">
        <output class="slider-value">{{ (fontScale() * 100) | number:'1.0-0' }}%</output>
      </div>
    </div>
  </div>}
</div>
